name: release

# Build downloadable binaries and attach them to a GitHub Release when a
# version tag (v*) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-13, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build dwg2png
        run: cargo build --release --bin dwg2png --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="target/${{ matrix.target }}/release"
          tar -C "$dir" -czf "dwg2png-${{ matrix.target }}.tar.gz" dwg2png

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dir="target/${{ matrix.target }}/release"
          7z a "dwg2png-${{ matrix.target }}.zip" "$dir/dwg2png.exe"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dwg2png-*.tar.gz
            dwg2png-*.zip
          generate_release_notes: true
